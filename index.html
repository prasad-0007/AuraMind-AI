<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraMind AI | Ignition HackVerse 2k26</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-6xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            AuraMind AI
        </h1>
        <p class="text-slate-400 mt-2">Future of Learning & Well-being | Pune 2k26</p>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-6xl w-full">
        <div class="glass p-4 rounded-3xl relative overflow-hidden shadow-2xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span> LIVE AI ANALYSIS</span>
                <span id="stress-badge" class="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-sm font-bold border border-emerald-500/50">CALM</span>
            </div>
            <div class="relative">
                <video id="video" autoplay muted class="rounded-xl w-full"></video>
            </div>
        </div>

        <div class="flex flex-col gap-6">
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-xl font-bold mb-4 text-blue-400">AI Tutor Insights</h3>
                <p id="tutor-text" class="text-lg leading-relaxed italic text-slate-300">Allow camera access to begin analysis...</p>
                <hr class="my-4 border-slate-700">
                <button onclick="updateInsight()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl transition-all font-bold">Refresh Advice</button>
            </div>

            <div class="glass p-6 rounded-3xl border-l-4 border-emerald-500">
                <h3 class="font-bold text-emerald-400 uppercase text-sm tracking-widest">Learning Optimization</h3>
                <p id="learning-mode" class="text-2xl mt-2">Mode: Concentration</p>
                <div class="w-full bg-slate-800 h-2 mt-4 rounded-full overflow-hidden">
                    <div id="stress-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 20%"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
