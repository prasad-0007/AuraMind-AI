<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraMind AI | Ignition HackVerse 2k26</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #video { transform: rotateY(180deg); width: 100%; border-radius: 1rem; background: #1e293b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10">

    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-6xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            AuraMind AI
        </h1>
        <p class="text-slate-400 mt-2">Future of Learning & Well-being | Pune 2k26</p>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-6xl w-full">
        <div class="glass p-4 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="flex items-center gap-2"><span id="live-dot" class="w-3 h-3 bg-slate-500 rounded-full"></span> <span id="status-text">INITIALIZING AI...</span></span>
                <span id="stress-badge" class="px-3 py-1 rounded-full bg-slate-800 text-slate-400 text-sm font-bold border border-slate-700">WAITING</span>
            </div>
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div class="flex flex-col gap-6">
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-xl font-bold mb-4 text-blue-400">AI Tutor Insights</h3>
                <p id="tutor-text" class="text-lg leading-relaxed italic text-slate-300">
                    Loading models from neural network... please wait.
                </p>
            </div>

            <div class="glass p-6 rounded-3xl border-l-4 border-emerald-500">
                <h3 class="font-bold text-emerald-400 uppercase text-sm tracking-widest">System Load</h3>
                <div class="w-full bg-slate-800 h-2 mt-4 rounded-full overflow-hidden">
                    <div id="stress-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="learning-mode" class="mt-4 text-slate-400">Status: Models Loading...</p>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        const liveDot = document.getElementById('live-dot');
        const tutorText = document.getElementById('tutor-text');
        const stressBadge = document.getElementById('stress-badge');
        const stressBar = document.getElementById('stress-bar');

        async function init() {
            try {
                console.log("Loading Models...");
                // Using a specific versioned CDN to avoid 'faceapi is not defined'
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);

                console.log("Models Loaded Successfully!");
                startVideo();
            } catch (error) {
                console.error("Model Load Error:", error);
                tutorText.innerText = "Error loading AI models. Please check internet connection.";
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640 } })
                .then(stream => {
                    video.srcObject = stream;
                    statusText.innerText = "AI ACTIVE";
                    liveDot.classList.replace('bg-slate-500', 'bg-red-500');
                    liveDot.classList.add('animate-pulse');
                    tutorText.innerText = "Hello! I am monitoring your focus. Let's start learning.";
                    analyze();
                })
                .catch(err => {
                    console.error("Camera Error:", err);
                    tutorText.innerText = "Camera access denied. Please allow camera to use AuraMind.";
                });
        }

        async function analyze() {
            setInterval(async () => {
                if (video.paused || video.ended) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();

                if (detections.length > 0) {
                    const expressions = detections[0].expressions;
                    const stressLevel = expressions.sad + expressions.angry + expressions.fearful;

                    if (stressLevel > 0.4) {
                        updateUI("STRESSED", "red", "खूप ताण जाणवत आहे का? थोडा वेळ विश्रांती घ्या.", "80%");
                    } else {
                        updateUI("CALM", "emerald", "Good focus! You are doing great.", "20%");
                    }
                }
            }, 1000);
        }

        function updateUI(status, color, msg, width) {
            stressBadge.innerText = status;
            stressBadge.className = `px-3 py-1 rounded-full bg-${color}-500/20 text-${color}-400 text-sm font-bold border border-${color}-500/50`;
            tutorText.innerText = msg;
            stressBar.style.width = width;
            stressBar.className = `bg-${color}-500 h-full transition-all duration-500`;
        }

        // Run Init on Load
        window.onload = init;
    </script>
</body>
</html>
