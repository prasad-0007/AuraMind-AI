<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraMind PRO v2.1 | Biometric Focus Tracker</title>
  <!-- face-api (deferred so it doesn't block render) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <!-- Your improved stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ── Header ── -->
  <header class="app-header">
    <h1 class="logo">
      <span class="highlight">AURAMIND</span>
      <span class="version">PRO v2.1</span>
    </h1>
    <div class="header-rule"></div>
    <p class="tagline">High-Speed Biometric Focus Analysis</p>
  </header>

  <!-- ── Main Grid ── -->
  <main class="main-grid">

    <!-- Left: Camera Panel -->
    <div id="camera-panel" class="glass camera-panel">
      <div class="cam-header">
        <div class="status-indicator">
          <div id="status-dot" class="status-dot idle"></div>
          <span id="status-label" class="status-label">Loading AI…</span>
        </div>
        <div id="emotion-tag" class="emotion-badge">SCANNING</div>
      </div>

      <div class="video-wrapper">
        <video id="video" autoplay muted playsinline aria-label="Camera feed"></video>

        <!-- Loader Overlay -->
        <div id="loader-overlay">
          <div id="loader-icon" class="loader-icon" aria-hidden="true"></div>
          <p id="loader-msg">Ready when you are.</p>
          <button class="start-btn" onclick="forceStart()">START ENGINE</button>
        </div>
      </div>

      <!-- Emotion chips (built by JS) -->
      <div id="emotion-chips" class="emotion-chips" aria-label="Detected emotions"></div>
    </div>

    <!-- Right: Info Panels -->
    <div class="right-col">

      <!-- AI Counselor -->
      <div class="glass counselor-card">
        <p class="card-label blue">AI Counselor</p>
        <p id="tutor-text" style="transition: opacity 0.25s ease;">Ready to begin.</p>
        <button id="end-btn" class="end-btn" onclick="endSession()">End Session</button>
      </div>

      <!-- Cognitive Stress -->
      <div class="glass stress-card">
        <div class="stress-header">
          <div>
            <p class="card-label emerald">Cognitive Stress</p>
            <p id="state-text">Standby</p>
          </div>
          <div id="stress-percent">0%</div>
        </div>
        <div class="bar-track">
          <div id="stress-bar"></div>
        </div>
      </div>

    </div>
  </main>
</div><!-- /app-wrapper -->

<!-- ── Report Modal ── -->
<div id="report-modal" role="dialog" aria-modal="true" aria-labelledby="report-title">
  <div class="glass report-card">
    <h2 id="report-title">Session Analytics</h2>
    <p class="subtitle">Focus Report</p>

    <div class="report-grid">
      <div class="report-tile">
        <span class="tile-label">Avg Stress</span>
        <p id="avg-stress" class="tile-value blue">0%</p>
      </div>
      <div class="report-tile">
        <span class="tile-label">Peak Stress</span>
        <p id="peak-val" class="tile-value red">0%</p>
      </div>
      <div class="report-tile" style="grid-column: span 2">
        <span class="tile-label">Overall State</span>
        <p id="peak-state" class="tile-value emerald">FOCUSED</p>
      </div>
    </div>

    <p id="report-advice"></p>

    <button class="new-session-btn" onclick="location.reload()">NEW SESSION</button>
  </div>
</div>

<!-- Your improved script -->
<script src="script.js"></script>
</body>
</html>
